name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_performance_tests:
        description: 'Run performance benchmark tests'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  security-tests:
    name: Security Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r server/requirements.txt
          python3 -m pip install requests pytest

      - name: Run security unit tests
        run: |
          cd server
          python3 run_tests.py --security

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: security-unit-test-results
          path: server/test-results/
        if: always()

  all-unit-tests:
    name: All Unit Tests
    runs-on: ubuntu-latest
    needs: security-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install requests pytest

      - name: Run all unit tests
        run: |
          cd server
          python3 run_tests.py --unit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: all-unit-test-results
          path: server/test-results/
        if: always()

  performance-tests:
    name: Performance Benchmark Tests
    runs-on: ubuntu-latest
    needs: all-unit-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance_tests == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r server/requirements.txt
          python3 -m pip install requests pytest

      - name: Start backend server
        run: |
          cd server
          python3 main.py &
          sleep 5
        env:
          FLASK_ENV: testing

      - name: Run performance benchmark tests
        run: |
          cd server
          python3 run_tests.py --performance 2>&1 | tee test-results/performance-test-results.txt

      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: server/test-results/
        if: always()

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: all-unit-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Notify deployment success
        run: |
          echo "Deployment completed successfully!"
