services:
  - type: web
    name: ai-trader-customization
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd server && python flask_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PORT
        value: "8001"
