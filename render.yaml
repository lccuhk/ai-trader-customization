services:
  - type: web
    name: trading-agent-for-dscourse-backend
    runtime: python
    plan: free
    buildCommand: |
      cd server
      pip install -r requirements.txt
      python run_tests.py --unit
    startCommand: cd server && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
